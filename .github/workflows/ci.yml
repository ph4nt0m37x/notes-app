name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          docker build -t marijailievskafinki/backend:latest ./backend

      - name: Push backend image
        run: |
          docker push marijailievskafinki/backend:latest

      - name: Build frontend image
        run: |
          docker build -t marijailievskafinki/frontend:latest ./frontend

      - name: Push frontend image
        run: |
          docker push marijailievskafinki/frontend:latest